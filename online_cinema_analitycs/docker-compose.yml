version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Zookeeper"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka-1:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka-1:
        condition: service_healthy
    command: >
      bash -c "kafka-topics --bootstrap-server kafka-1:29092 --create --if-not-exists --topic movie-events --partitions 3 --replication-factor 1"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    depends_on:
      kafka-1:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka-1:29092
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  schema-init:
    image: curlimages/curl:8.6.0
    depends_on:
      schema-registry:
        condition: service_healthy
    volumes:
      - ./schema/movie_event.schema.json:/schema/movie_event.schema.json:ro
    command: >
      sh -c 'curl -fsS -X POST -H "Content-Type: application/vnd.schemaregistry.v1+json" --data @/schema/movie_event.schema.json http://schema-registry:8081/subjects/movie-events-value/versions'

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: analytics
      CLICKHOUSE_PASSWORD: analytics
    volumes:
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user analytics --password analytics --query 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:15
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d analytics"]
      interval: 10s
      timeout: 5s
      retries: 12

  producer:
    build: ./producer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: kafka-1:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  aggregator:
    build: ./aggregator
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8082:8081"
    environment:
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: analytics
      CLICKHOUSE_PASSWORD: analytics
      POSTGRES_URL: postgresql://user:pass@postgres:5432/analytics?sslmode=disable
      AGGREGATION_INTERVAL: 1m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
