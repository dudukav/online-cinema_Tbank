syntax = "proto3";

package movie.cinema;

option go_package = "producer/proto";

message MovieEvent {
    string      event_id         = 1;
    string      user_id          = 2;
    string      movie_id         = 3;
    EventType   event_type       = 4;
    int64       timestamp_ms     = 5;  
    DeviceType  device_type      = 6;
    string      session_id       = 7;
    int32       progress_seconds = 8;
}

enum EventType {
    VIEW_STARTED   = 0;
    VIEW_FINISHED  = 1;
    VIEW_PAUSED    = 2;
    VIEW_RESUMED   = 3;
    LIKED          = 4;
    SEARCHED       = 5;
  }

enum DeviceType {
    MOBILE  = 0;
    DESKTOP = 1;
    TV      = 2;
    TABLET  = 3;
}